services:
  kokoro:
    build:
      context: ./inference/kokoro
      args:
        KOKORO_BASE: nvidia/cuda:12.8.0-runtime-ubuntu22.04
    gpus: all

  llama_cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus: all
    environment:
      - LLAMA_ARG_N_GPU_LAYERS=${LLAMA_N_GPU_LAYERS:-35}

  whisper:
    build:
      args:
        WHISPER_BASE: ${WHISPER_BASE:-nvidia/cuda:12.8.0-cudnn-runtime-ubuntu22.04}
    gpus: all
    environment:
      - VOXBOX_DEVICE=${VOXBOX_DEVICE:-cuda:0}
